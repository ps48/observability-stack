# OpenSearch Dashboards Configuration
# Web UI for visualizing and exploring logs and traces

# Server configuration
# Host and port for the Dashboards web server
server.host: '0.0.0.0'
server.port: 5601
server.name: 'observability-stack-dashboards'

# OpenSearch connection configuration
# URL of the OpenSearch cluster to connect to
opensearch.hosts: ["OPENSEARCH_HOSTS"]

# Credentials for connecting to OpenSearch
# Injected at container startup via environment variables
opensearch.username: "OPENSEARCH_USER"
opensearch.password: "OPENSEARCH_PASSWORD"

# SSL/TLS configuration
# Disable certificate verification for development with self-signed certs
opensearch.ssl.verificationMode: 'none'

# Request timeout for OpenSearch queries (in milliseconds)
# Increase if working with large datasets
opensearch.requestTimeout: 30000

# Ping timeout for health checks (in milliseconds)
opensearch.pingTimeout: 3000

# Security configuration
# Allow requests from any origin for development
opensearch.requestHeadersAllowlist: [authorization, securitytenant]

# Anonymous authentication - skip login page for browse access
# Anonymous users can view all data and create/modify saved objects (visualizations, dashboards, saved queries)
# but cannot delete existing saved objects or perform admin operations
# Modify access is required — Dashboards persists UI settings via update/bulk writes on page load
# Set OPENSEARCH_ANONYMOUS_AUTH_ENABLED=true in .env to enable
opensearch_security.auth.anonymous_auth_enabled: OPENSEARCH_ANONYMOUS_AUTH_ENABLED

# Multi-tenancy configuration
# Disabled for simpler development setup
opensearch_security.multitenancy.enabled: false
opensearch_security.multitenancy.tenants.preferred: ["Private", "Global"]

# Read-only mode roles
opensearch_security.readonly_mode.roles: ["kibana_read_only"]

# Logging configuration
# Controls what gets logged and at what level
logging:
  quiet: false
  verbose: false
  dest: stdout

# Console settings for Dev Tools
# Allows direct interaction with OpenSearch API
console.enabled: true

# Vega visualizations
# Enable external URLs for Vega visualizations
vis_type_vega.enableExternalUrls: true

# Advanced settings
# Maximum payload size for requests (in bytes)
server.maxPayloadBytes: 1048576

# Compression for responses
server.compression.enabled: true

# CORS configuration for development
# Allows requests from any origin - restrict in production!
server.cors: true

# CSP (Content Security Policy) settings
# Relaxed for development, should be stricter in production
csp.strict: false
csp.warnLegacyBrowsers: false

# Saved objects configuration
# Maximum number of saved objects to import at once (in bytes)
savedObjects.maxImportPayloadBytes: 26214400

explore.enabled: true
explore.discoverTraces.enabled: true
explore.discoverMetrics.enabled: true
explore.agentTraces.enabled: true
workspace.enabled: true
# Saved-object-level permission checks.
# When anonymous auth is enabled, this must be false so anonymous users can access
# workspaces created by the init script. Without this, only the workspace owner (admin)
# can access workspace-scoped API calls — anonymous users get 403.
# This version of OSD does not support per-workspace permission grants via the API.
# When anonymous auth is disabled, this is true (default) to preserve workspace permissions.
# Value is computed at container startup from OPENSEARCH_ANONYMOUS_AUTH_ENABLED.
savedObjects.permission.enabled: SAVED_OBJECTS_PERMISSION_ENABLED
data_source.enabled: true
data_source.ssl.verificationMode: none
datasetManagement.enabled: true
data.savedQueriesNewUI.enabled: true
opensearchDashboards.branding.useExpandedHeader: false

uiSettings.overrides.home:useNewHomePage: true
uiSettings.overrides.query:enhancements:enabled: true
uiSettings.overrides.explore:experimental: true