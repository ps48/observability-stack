# OpenSearch Security Roles
# Defines the anonymous access role for browse access and creating saved objects
# Anonymous users are automatically assigned `opendistro_security_anonymous_role`
#
# WARNING: This file REPLACES the default OpenSearch roles.yml entirely.
# Only the anonymous role is defined here because it is the only custom role needed.
# Reserved/static roles built into the security plugin are NOT affected:
#   - all_access, kibana_server, kibana_read_only, own_index, manage_snapshots,
#     readall, readall_and_monitor, security_rest_api_access, etc.
# The default roles.yml ships with no non-reserved custom roles, so nothing is lost.
# If you need additional custom roles, add them to this file.

_meta:
  type: "roles"
  config_version: 2

# Read-only role for anonymous (unauthenticated) users
opendistro_security_anonymous_role:
  reserved: true
  cluster_permissions:
    - "read"
    - "cluster_monitor"
    - "cluster_composite_ops"
    # For scroll queries
    - "indices:data/read/scroll*"
    # PPL and SQL query APIs
    - "cluster:admin/opensearch/ppl"
    - "cluster:admin/opensearch/sql"
    # Direct query APIs (SQL plugin) — datasource listing and query execution
    - "cluster:admin/opensearch/ql/datasources/read"
    - "cluster:admin/opensearch/ql/async_query/read"
    - "cluster:admin/opensearch/direct_query/read/query"
  index_permissions:
    # OpenSearch Dashboards system indices - write access for UI settings and saved objects
    # index (create/upsert), update, and bulk are granted so Dashboards can persist UI settings
    # on page load and allow normal saved-object workflows. delete is NOT included,
    # so anonymous users cannot remove existing dashboards, saved queries, or index patterns.
    - index_patterns:
      - ".kibana"
      - ".kibana-6"
      - ".kibana_*"
      - ".opensearch_dashboards"
      - ".opensearch_dashboards-6"
      - ".opensearch_dashboards_*"
      allowed_actions:
        - "read"
        - "indices:data/write/index*"
        - "indices:data/write/update*"
        - "indices:data/write/bulk*"
    # Task and management indices
    - index_patterns:
      - ".tasks"
      - ".management-beats"
      - "*:.tasks"
      - "*:.management-beats"
      allowed_actions:
        - "read"
    # All other indices - full read access
    - index_patterns:
      - '*'
      allowed_actions:
        - "read"
        - "indices:data/read/*"
        - "indices:admin/get"
        - "indices:admin/exists"
        - "indices:admin/aliases/exists*"
        - "indices:admin/aliases/get*"
        - "indices:admin/mappings/get"
        - "indices:admin/resolve/index"
        - "indices:monitor/settings/get"
        - "indices:monitor/stats"
  tenant_permissions:
    # kibana_all_write is required — Dashboards API endpoints (/api/saved_objects/*,
    # /api/opensearch-dashboards/settings) enforce tenant-level permissions on top of
    # index-level permissions. kibana_all_read blocks all writes through these APIs,
    # causing 403 errors on page load when Dashboards tries to persist UI settings.
    - tenant_patterns:
      - '*'
      allowed_actions:
        - "kibana_all_write"
