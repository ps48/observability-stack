name: CLI Unit Tests

on:
  push:
    paths:
      - 'open-stack/**'
  pull_request:
    paths:
      - 'open-stack/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        working-directory: open-stack
        run: npm ci
      - name: Run unit tests
        working-directory: open-stack
        run: node --test test/unit.test.mjs
